name = "gtpv-worker"
main = "worker/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Custom domain — set in Cloudflare Dashboard
# workers.gtpv.kmshweb.com → this worker

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "gtpv-images"   # <-- change to your actual R2 bucket name

# Secrets — set via CLI:
#   npx wrangler secret put SALT
#   npx wrangler secret put FOLDER_CODES
#
# FOLDER_CODES is a JSON string, e.g.:
#   {"lil-u":"1234","friends":"5678"}
